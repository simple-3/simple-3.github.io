        placeholder="Search Sound Effects..."
        onkeyup="searchSoundEffects()"

    <p class="no-results-text">Sorry, we dont have that game yet.</p>

<script>
const TAB_DISGUISE_KEY = "backdoorlabs_tab_disguise";
const searchBar = document.getElementById("searchBar");
const topbarDisguiseBtn = document.getElementById("topbarDisguiseBtn");
const pageTitle = document.getElementById("pageTitle");
const soundEffectsGrid = document.getElementById("soundEffectsGrid");
const noResults = document.getElementById("noResults");
const soundEffectPlayer = new Audio();

const soundEffects = [
    {
        title: "Smoke Alarm Beep",
        imgSrc: "game%20logos/button.png",
        alt: "Sound effect button",
        audioSrc: "sounds/smoke-alarm-beep.mp3"
    },
    {
        title: "FAH",
        imgSrc: "game%20logos/button.png",
        alt: "FAH button",
        audioSrc: "sounds/fah.mp3"
    },
    {
        title: "Vine Boom",
        imgSrc: "game%20logos/button.png",
        alt: "Vine Boom button",
        audioSrc: "sounds/vine-boom.mp3"
    },
    {
        title: "Apple Pay",
        imgSrc: "game%20logos/button.png",
        alt: "Apple Pay button",
        audioSrc: "sounds/apple-pay.mp3"
    },
    {
        title: "We Are Charlie Kirk",
        imgSrc: "game%20logos/button.png",
        alt: "We Are Charlie Kirk button",
        audioSrc: "sounds/we-are-charlie-kirk.mp3"
    },
    {
        title: "Outro Song",
        imgSrc: "game%20logos/button.png",
        alt: "Outro Song button",
        audioSrc: "sounds/outro-song.mp3"
    },
    {
        title: "Rizz",
        imgSrc: "game%20logos/button.png",
        alt: "Rizz button",
        audioSrc: "sounds/rizz.mp3"
    },
    {
        title: "Fart",
        imgSrc: "game%20logos/button.png",
        alt: "Fart button",
        audioSrc: "sounds/fart.mp3"
    },
    {
        title: "Get Out",
        imgSrc: "game%20logos/button.png",
        alt: "Get Out button",
        audioSrc: "sounds/get-out.mp3"
    },
    {
        title: "Gay Echo",
        imgSrc: "game%20logos/button.png",
        alt: "Gay Echo button",
        audioSrc: "sounds/gey-echo.mp3"
    },
    {
        title: "Tiki Tiki",
        imgSrc: "game%20logos/button.png",
        alt: "Tiki Tiki button",
        audioSrc: "sounds/tiki-tiki.mp3"
    },
    {
        title: "Dog Whistle",
        imgSrc: "game%20logos/button.png",
        alt: "Dog Whistle button",
        audioSrc: "sounds/dog-whistle.mp3"
    },
    {
        title: "Anderdingus",
        imgSrc: "game%20logos/button.png",
        alt: "Anderdingus button",
        audioSrc: "sounds/anderdingus.mp3"
    },
    {
        title: "Discord Notification",
        imgSrc: "game%20logos/button.png",
        alt: "Discord Notification button",
        audioSrc: "sounds/discord-notification.mp3"
    }
];

function isTabDisguised() {
    return localStorage.getItem(TAB_DISGUISE_KEY) === "google";
}

function applyTabDisguise() {
    document.title = isTabDisguised() ? "Google" : "Sound Effects | Backdoor Labs";
    const favicon = document.querySelector('link[rel="icon"]');
    if (favicon) {
        favicon.href = isTabDisguised() ? "game%20logos/google.png" : "game%20logos/logo.png";
    }
}

function updateDisguiseTabButton() {
    if (!topbarDisguiseBtn) return;
    topbarDisguiseBtn.textContent = isTabDisguised() ? "Undisguise Tab" : "Disguise Tab";
}

function getSearchScore(title, query) {
    const normalizedTitle = title.toLowerCase();
    const normalizedQuery = query.toLowerCase().trim();

    if (!normalizedQuery) {
        return 1000;
    }

    const startsAt = normalizedTitle.indexOf(normalizedQuery);
    if (startsAt === 0) {
        return 0;
    }
    if (startsAt > 0) {
        return startsAt;
    }

    const words = normalizedTitle.split(/[^a-z0-9]+/).filter(Boolean);
    const wordMatchIndex = words.findIndex((word) => word.startsWith(normalizedQuery));
    if (wordMatchIndex !== -1) {
        return 50 + wordMatchIndex;
    }

    return 1000;
}

function updatePageTitleCount(count) {
    if (!pageTitle) return;
    pageTitle.textContent = `Sound Effects (${count})`;
}

function playSoundEffect(audioSrc) {
    if (!audioSrc) return;
    if (soundEffectPlayer.src !== new URL(audioSrc, window.location.href).href) {
        soundEffectPlayer.src = audioSrc;
    }
    soundEffectPlayer.currentTime = 0;
    soundEffectPlayer.play().catch(() => {});
}

function renderSoundEffects() {
    const query = searchBar ? searchBar.value.trim().toLowerCase() : "";
    let displayEffects = [...soundEffects];

    if (query) {
        displayEffects = displayEffects
            .filter((effect) => effect.title.toLowerCase().includes(query))
            .sort((a, b) => {
                const aScore = getSearchScore(a.title, query);
                const bScore = getSearchScore(b.title, query);
                if (aScore !== bScore) {
                    return aScore - bScore;
                }
                return a.title.localeCompare(b.title);
            });
    }

    updatePageTitleCount(displayEffects.length);

    if (!soundEffectsGrid) return;
    if (!displayEffects.length) {
        soundEffectsGrid.style.display = "none";
        if (noResults) {
            noResults.style.display = "block";
        }
        return;
    }

    if (noResults) {
        noResults.style.display = "none";
    }
    soundEffectsGrid.innerHTML = displayEffects.map((effect) => `
        <button class="game sound-effect-card" type="button" aria-label="${effect.title}" data-audio-src="${effect.audioSrc || ""}">
            <img src="${effect.imgSrc}" alt="${effect.alt}">
            <p>${effect.title}</p>
        </button>
    `).join("");
    soundEffectsGrid.style.display = "grid";
    soundEffectsGrid.querySelectorAll(".sound-effect-card").forEach((button) => {
        button.addEventListener("click", () => {
            playSoundEffect(button.dataset.audioSrc);
        });
    });
}

function searchSoundEffects() {
    renderSoundEffects();
}

document.addEventListener("DOMContentLoaded", () => {
    applyTabDisguise();
    updateDisguiseTabButton();
    renderSoundEffects();

    if (topbarDisguiseBtn) {
        topbarDisguiseBtn.addEventListener("click", () => {
            if (isTabDisguised()) {
                localStorage.removeItem(TAB_DISGUISE_KEY);
            } else {
                localStorage.setItem(TAB_DISGUISE_KEY, "google");
            }
            applyTabDisguise();
            updateDisguiseTabButton();
        });
    }
});
</script>
